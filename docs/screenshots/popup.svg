<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Extension popup screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b18"/>
      <stop offset="55%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>
  <rect x="40" y="40" width="820" height="440" rx="18" fill="rgba(255,255,255,0.03)" stroke="url(#stroke)" stroke-width="2"/>

  <text x="70" y="92" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="800" font-size="26">
    Live Call Firewall (Popup)
  </text>
  <text x="70" y="122" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="600" font-size="14">
    Screenshot placeholder. Replace this file with a real popup screenshot.
  </text>

  <rect x="70" y="160" width="360" height="250" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="92" y="195" fill="#a5b4fc" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="800" font-size="13" letter-spacing="1">
    THREAT SCORE
  </text>
  <circle cx="250" cy="305" r="70" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.35)" stroke-width="10"/>
  <text x="250" y="315" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="28">
    --
  </text>

  <rect x="460" y="160" width="370" height="130" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="482" y="195" fill="#fbbf24" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="13" letter-spacing="1">
    AI ANALYSIS
  </text>
  <text x="482" y="222" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="600" font-size="14">
    Start or join a call to begin monitoring.
  </text>

  <rect x="460" y="310" width="370" height="100" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="482" y="344" fill="#fbbf24" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="13" letter-spacing="1">
    URL CHECK
  </text>
  <text x="482" y="372" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="600" font-size="14">
    Paste a link to scan for phishing patterns.
  </text>
</svg>

