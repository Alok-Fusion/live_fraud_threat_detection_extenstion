<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Popup URL Check screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b18"/>
      <stop offset="60%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>
  <rect x="40" y="40" width="820" height="440" rx="18" fill="rgba(255,255,255,0.03)" stroke="url(#accent)" stroke-width="2"/>

  <text x="70" y="92" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="800" font-size="26">
    URL Check (Popup)
  </text>
  <text x="70" y="122" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="600" font-size="14">
    Placeholder. Replace this file with a real URL Check result screenshot.
  </text>

  <rect x="70" y="170" width="760" height="110" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="92" y="208" fill="#fbbf24" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="13" letter-spacing="1">
    INPUT
  </text>
  <rect x="92" y="220" width="560" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
  <text x="110" y="246" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-weight="600" font-size="13">
    https://example.com/login?redirect=...
  </text>
  <rect x="668" y="220" width="140" height="40" rx="10" fill="rgba(245,158,11,0.14)" stroke="rgba(245,158,11,0.35)"/>
  <text x="738" y="246" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="13">
    Check
  </text>

  <rect x="70" y="310" width="760" height="150" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="92" y="348" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="14" letter-spacing="0.2">
    RESULT
  </text>

  <rect x="92" y="362" width="230" height="30" rx="999" fill="rgba(245,158,11,0.14)" stroke="rgba(245,158,11,0.30)"/>
  <text x="207" y="383" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="900" font-size="12">
    Suspicious · 55/100
  </text>

  <rect x="340" y="362" width="470" height="30" rx="999" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  <text x="575" y="383" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-weight="800" font-size="12">
    Indicators: non-HTTPS, redirect param, suspicious keywords...
  </text>
</svg>

